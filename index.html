<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Days — 人生可视化进度</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0a0f'/%3E%3Cg fill='%2300ff88'%3E%3Crect x='4' y='4' width='5' height='5' rx='1'/%3E%3Crect x='11' y='4' width='5' height='5' rx='1'/%3E%3Crect x='18' y='4' width='5' height='5' rx='1'/%3E%3Crect x='4' y='11' width='5' height='5' rx='1'/%3E%3Crect x='11' y='11' width='5' height='5' rx='1'/%3E%3Crect x='18' y='11' width='5' height='5' rx='1'/%3E%3Crect x='4' y='18' width='5' height='5' rx='1'/%3E%3C/g%3E%3Crect x='11' y='18' width='5' height='5' rx='1' fill='%2300ffcc'/%3E%3Cg fill='%231a1a2e'%3E%3Crect x='18' y='18' width='5' height='5' rx='1'/%3E%3Crect x='25' y='4' width='5' height='5' rx='1'/%3E%3Crect x='25' y='11' width='5' height='5' rx='1'/%3E%3Crect x='25' y='18' width='5' height='5' rx='1'/%3E%3Crect x='4' y='25' width='5' height='5' rx='1'/%3E%3Crect x='11' y='25' width='5' height='5' rx='1'/%3E%3Crect x='18' y='25' width='5' height='5' rx='1'/%3E%3Crect x='25' y='25' width='5' height='5' rx='1'/%3E%3C/g%3E%3C/svg%3E">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0f;
    --card:#12121a;
    --border:#1e1e2e;
    --text:#e0e0e0;
    --text-dim:#6a6a7a;
    --green:#00ff88;
    --cyan:#00ffcc;
    --future:#1a1a2e;
    --danger:#ff4466;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 16px;
  }

  /* ── Header ── */
  .header{
    text-align:center;
    margin-bottom:32px;
    position:relative;
    width:100%;
    max-width:960px;
  }
  .header h1{
    font-size:1.8rem;
    font-weight:700;
    background:linear-gradient(135deg,var(--green),var(--cyan));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:4px;
  }
  .header .subtitle{
    font-size:.9rem;
    color:var(--text-dim);
  }
  .top-actions{
    position:absolute;
    top:0;right:0;
    display:flex;gap:8px;
  }
  .top-actions button{
    background:transparent;
    border:1px solid var(--border);
    color:var(--text-dim);
    padding:4px 10px;
    border-radius:6px;
    cursor:pointer;
    font-size:.8rem;
    transition:all .2s;
  }
  .top-actions button:hover{
    border-color:var(--cyan);
    color:var(--cyan);
  }

  /* ── Setup Panel ── */
  .setup-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.7);
    backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center;
    z-index:100;
    animation:fadeIn .3s ease;
  }
  .setup-overlay.hidden{display:none}
  .setup-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:32px;
    width:90%;max-width:400px;
    box-shadow:0 0 60px rgba(0,255,136,.08);
  }
  .setup-card h2{
    font-size:1.3rem;
    margin-bottom:20px;
    color:var(--green);
  }
  .form-group{
    margin-bottom:16px;
  }
  .form-group label{
    display:block;
    font-size:.85rem;
    color:var(--text-dim);
    margin-bottom:6px;
  }
  .form-group input{
    width:100%;
    padding:10px 14px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    font-size:1rem;
    outline:none;
    transition:border-color .2s;
  }
  .form-group input:focus{
    border-color:var(--green);
    box-shadow:0 0 12px rgba(0,255,136,.15);
  }
  .form-error{
    font-size:.8rem;
    color:var(--danger);
    margin-top:4px;
    min-height:1.2em;
  }
  .btn-primary{
    width:100%;
    padding:12px;
    background:linear-gradient(135deg,var(--green),var(--cyan));
    border:none;
    border-radius:8px;
    color:var(--bg);
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    transition:opacity .2s;
    margin-top:8px;
  }
  .btn-primary:hover{opacity:.85}

  /* ── Stats ── */
  .stats{
    width:100%;max-width:960px;
    margin-bottom:24px;
  }
  .stats-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:12px;
  }
  .stat-big{
    font-size:2rem;
    font-weight:700;
    color:var(--green);
    text-shadow:0 0 20px rgba(0,255,136,.4);
  }
  .stat-label{
    font-size:.85rem;
    color:var(--text-dim);
  }
  .stat-detail{
    font-size:.95rem;
    color:var(--text-dim);
  }
  .stat-detail span{
    color:var(--green);
    font-weight:600;
  }
  .progress-bar-track{
    width:100%;
    height:6px;
    background:var(--future);
    border-radius:3px;
    overflow:hidden;
    margin-top:8px;
  }
  .progress-bar-fill{
    height:100%;
    background:linear-gradient(90deg,var(--green),var(--cyan));
    border-radius:3px;
    box-shadow:0 0 12px rgba(0,255,136,.5);
    transition:width .6s ease;
  }

  /* ── Canvas ── */
  .canvas-wrap{
    width:100%;max-width:960px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
    margin-bottom:24px;
  }
  .canvas-wrap canvas{
    display:block;
    width:100%;
    border-radius:8px;
  }

  /* ── Legend ── */
  .legend{
    display:flex;gap:20px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:16px;
    font-size:.8rem;
    color:var(--text-dim);
  }
  .legend-item{
    display:flex;align-items:center;gap:6px;
  }
  .legend-dot{
    width:10px;height:10px;border-radius:2px;
  }
  .legend-dot.lived{background:var(--green);box-shadow:0 0 6px var(--green)}
  .legend-dot.today{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
  .legend-dot.future{background:var(--future)}

  /* ── Side Panel ── */
  .side-toggle{
    position:fixed;
    left:0;top:50%;
    transform:translateY(-50%);
    z-index:50;
    width:28px;height:64px;
    background:var(--card);
    border:1px solid transparent;
    border-left:none;
    border-radius:0 8px 8px 0;
    color:var(--text-dim);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:.75rem;
    transition:all .3s;
    writing-mode:vertical-rl;
    letter-spacing:2px;
    overflow:visible;
  }
  .side-toggle::before{
    content:'';
    position:absolute;
    inset:-1px;
    border-radius:0 8px 8px 0;
    padding:1px;
    background:conic-gradient(
      from var(--glow-angle, 0deg),
      var(--cyan), var(--green), transparent 40%, transparent 60%, var(--green), var(--cyan)
    );
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    animation:glowRotate 3s linear infinite;
  }
  .side-toggle::after{
    content:'';
    position:absolute;
    inset:-4px;
    border-radius:0 10px 10px 0;
    background:conic-gradient(
      from var(--glow-angle, 0deg),
      rgba(0,255,204,.3), rgba(0,255,136,.2), transparent 40%, transparent 60%, rgba(0,255,136,.2), rgba(0,255,204,.3)
    );
    filter:blur(6px);
    animation:glowRotate 3s linear infinite;
    z-index:-1;
  }
  @property --glow-angle{
    syntax:'<angle>';
    initial-value:0deg;
    inherits:false;
  }
  @keyframes glowRotate{
    to{--glow-angle:360deg}
  }
  .side-toggle:hover{
    background:var(--border);
    color:var(--cyan);
    width:32px;
  }
  .side-toggle:hover::after{
    filter:blur(10px);
    inset:-6px;
  }
  .side-toggle .arrow{
    font-size:.6rem;
    margin-bottom:4px;
    display:inline-block;
    transition:transform .3s;
  }
  .side-panel.open ~ .side-toggle .arrow{
    transform:rotate(180deg);
  }

  .side-panel{
    position:fixed;
    left:0;top:0;bottom:0;
    width:320px;
    background:var(--card);
    border-right:1px solid var(--border);
    z-index:40;
    transform:translateX(-100%);
    transition:transform .3s ease;
    display:flex;flex-direction:column;
    overflow-y:auto;
  }
  .side-panel.open{
    transform:translateX(0);
    box-shadow:4px 0 30px rgba(0,0,0,.5);
  }
  .side-panel-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 20px 12px;
    border-bottom:1px solid var(--border);
  }
  .side-panel-header h3{
    font-size:1rem;
    color:var(--cyan);
    display:flex;align-items:center;gap:8px;
  }
  .side-panel-close{
    background:none;border:none;
    color:var(--text-dim);font-size:1.2rem;
    cursor:pointer;padding:4px;
    transition:color .2s;
  }
  .side-panel-close:hover{color:var(--danger)}
  .side-panel-body{
    padding:20px;
    flex:1;
  }
  .side-panel-body .form-group{margin-bottom:14px}
  .side-panel-body .form-group label{
    display:block;font-size:.8rem;
    color:var(--text-dim);margin-bottom:5px;
  }
  .side-panel-body .form-group input{
    width:100%;padding:9px 12px;
    background:var(--bg);border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-size:.95rem;
    outline:none;transition:border-color .2s;
  }
  .side-panel-body .form-group input:focus{
    border-color:var(--cyan);
    box-shadow:0 0 10px rgba(0,255,204,.12);
  }
  .cost-result{
    margin-top:20px;
    padding:16px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:10px;
    text-align:center;
    min-height:80px;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:8px;
  }
  .cost-result.hidden-result{
    color:var(--text-dim);
    font-size:.85rem;
    font-style:italic;
  }
  .cost-result .cost-value{
    font-size:1.6rem;
    font-weight:700;
    color:var(--cyan);
    text-shadow:0 0 16px rgba(0,255,204,.4);
  }
  .cost-result .cost-label{
    font-size:.8rem;
    color:var(--text-dim);
  }
  .cost-result .cost-breakdown{
    font-size:.85rem;
    color:var(--text-dim);
    margin-top:4px;
    line-height:1.6;
  }
  .cost-result .cost-breakdown span{
    color:var(--green);
    font-weight:600;
  }
  .cost-hint{
    margin-top:16px;
    padding:12px;
    background:rgba(0,255,204,.04);
    border:1px dashed var(--border);
    border-radius:8px;
    font-size:.75rem;
    color:var(--text-dim);
    line-height:1.5;
  }

  /* ── Footer ── */
  .footer{
    margin-top:auto;
    padding-top:24px;
    text-align:center;
    font-size:.75rem;
    color:var(--text-dim);
  }

  /* ── Animations ── */
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  /* ── Responsive ── */
  @media(max-width:480px){
    .header h1{font-size:1.3rem}
    .stat-big{font-size:1.5rem}
    .setup-card{padding:24px 20px}
    .side-panel{width:85vw}
  }
</style>
</head>
<body>

<!-- Side Panel: Cost of Life -->
<div class="side-panel" id="sidePanel">
  <div class="side-panel-header">
    <h3>💰 <span id="panelTitle">寿命计算器</span></h3>
    <button class="side-panel-close" id="btnPanelClose">✕</button>
  </div>
  <div class="side-panel-body">
    <div class="form-group">
      <label id="labelSalary">月薪（元）</label>
      <input type="number" id="inputSalary" min="1" placeholder="10000">
    </div>
    <div class="form-group">
      <label id="labelItemPrice">物品价格（元）</label>
      <input type="number" id="inputItemPrice" min="0" placeholder="9999">
    </div>
    <div class="cost-result hidden-result" id="costResult">
      <span id="costPlaceholder">输入月薪和物品价格后自动计算</span>
    </div>
    <div class="cost-hint" id="costHint">
      💡 <span id="costHintText">这个计算器将物品价格换算为你需要工作多少时间才能购买——用生命衡量消费的真实成本。</span>
    </div>
  </div>
</div>
<button class="side-toggle" id="btnSideToggle">
  <span class="arrow">▶</span><span id="toggleLabel">寿命</span>
</button>

<!-- Setup Overlay -->
<div class="setup-overlay hidden" id="setupOverlay">
  <div class="setup-card">
    <h2 id="setupTitle">设置</h2>
    <div class="form-group">
      <label id="labelBirth">出生日期</label>
      <input type="date" id="inputBirth">
      <div class="form-error" id="errorBirth"></div>
    </div>
    <div class="form-group">
      <label id="labelLifespan">预期寿命（年）</label>
      <input type="number" id="inputLifespan" min="1" max="150" value="82">
      <div class="form-error" id="errorLifespan"></div>
    </div>
    <button class="btn-primary" id="btnSave">开始</button>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="top-actions">
    <button id="btnLang">EN</button>
    <button id="btnReset">⚙</button>
  </div>
  <h1 id="mainTitle">人生可视化进度</h1>
  <p class="subtitle" id="mainSubtitle">每一天，都值得被看见</p>
</div>

<!-- Stats -->
<div class="stats" id="statsSection" style="display:none">
  <div class="stats-row">
    <div>
      <span class="stat-big" id="statPercent">0%</span>
      <span class="stat-label" id="statPercentLabel"> 已走过</span>
    </div>
    <div class="stat-detail">
      <span id="statLived">0</span> / <span id="statTotal">0</span> <span id="statDaysLabel">天</span>
    </div>
  </div>
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="stats-row" style="margin-top:12px">
    <div class="stat-detail">
      <span id="labelRemaining">剩余</span>: <span id="statRemaining">0</span> <span id="statRemDaysLabel">天</span>
    </div>
    <div class="stat-detail">
      <span id="labelAge">年龄</span>: <span id="statAge">0</span>
    </div>
  </div>
</div>

<!-- Canvas -->
<div class="canvas-wrap" id="canvasWrap" style="display:none">
  <canvas id="gridCanvas"></canvas>
</div>

<!-- Legend -->
<div class="legend" id="legendSection" style="display:none">
  <div class="legend-item"><div class="legend-dot lived"></div><span id="legendLived">已度过</span></div>
  <div class="legend-item"><div class="legend-dot today"></div><span id="legendToday">今天</span></div>
  <div class="legend-item"><div class="legend-dot future"></div><span id="legendFuture">未来</span></div>
</div>

<div class="footer" id="footerText">用一个格子，记住每一天</div>

<script>
(function () {
  'use strict';

  // ── i18n ──
  const I18N = {
    zh: {
      setupTitle: '设置',
      labelBirth: '出生日期',
      labelLifespan: '预期寿命（年）',
      btnSave: '开始',
      mainTitle: '人生可视化进度',
      mainSubtitle: '每一天，都值得被看见',
      statPercentLabel: ' 已走过',
      statDaysLabel: '天',
      statRemDaysLabel: '天',
      labelRemaining: '剩余',
      labelAge: '年龄',
      legendLived: '已度过',
      legendToday: '今天',
      legendFuture: '未来',
      footerText: '用一个格子，记住每一天',
      errorFuture: '出生日期不能是未来',
      errorRequired: '请填写出生日期',
      errorLifespan: '寿命需在 1-150 之间',
      btnLang: 'EN',
      btnReset: '⚙',
      panelTitle: '寿命计算器',
      labelSalary: '月薪（元）',
      labelItemPrice: '物品价格（元）',
      costPlaceholder: '输入月薪和物品价格后自动计算',
      costHintText: '这个计算器将物品价格换算为你需要工作多少时间才能购买——用生命衡量消费的真实成本。',
      toggleLabel: '寿命',
      costYears: '年',
      costMonths: '个月',
      costDays: '天',
      costHours: '小时',
      costOfLife: '你需要用生命中的',
      costToBuy: '来交换',
      costDailyWage: '日薪',
      costHourlyWage: '时薪',
    },
    en: {
      setupTitle: 'Setup',
      labelBirth: 'Birth Date',
      labelLifespan: 'Expected Lifespan (years)',
      btnSave: 'Start',
      mainTitle: 'Life Visualized',
      mainSubtitle: 'Every single day counts',
      statPercentLabel: ' lived',
      statDaysLabel: 'days',
      statRemDaysLabel: 'days',
      labelRemaining: 'Remaining',
      labelAge: 'Age',
      legendLived: 'Lived',
      legendToday: 'Today',
      legendFuture: 'Future',
      footerText: 'One cell for every day of your life',
      errorFuture: 'Birth date cannot be in the future',
      errorRequired: 'Please enter your birth date',
      errorLifespan: 'Lifespan must be between 1 and 150',
      btnLang: '中文',
      btnReset: '⚙',
      panelTitle: 'Life Cost Calculator',
      labelSalary: 'Monthly Salary',
      labelItemPrice: 'Item Price',
      costPlaceholder: 'Enter salary and price to calculate',
      costHintText: 'This calculator converts item prices into the working time needed to afford them — measuring the true cost of spending in life.',
      toggleLabel: 'Cost',
      costYears: 'yrs',
      costMonths: 'months',
      costDays: 'days',
      costHours: 'hrs',
      costOfLife: 'It costs',
      costToBuy: 'of your life',
      costDailyWage: 'Daily wage',
      costHourlyWage: 'Hourly wage',
    },
  };

  const STORAGE_KEY = 'life-in-days-config';
  const LANG_KEY = 'life-in-days-lang';

  let currentLang = 'zh';
  let config = null; // { birthDate: 'YYYY-MM-DD', lifespan: 82 }

  // ── DOM refs ──
  const $ = (id) => document.getElementById(id);
  const setupOverlay = $('setupOverlay');
  const inputBirth = $('inputBirth');
  const inputLifespan = $('inputLifespan');
  const errorBirth = $('errorBirth');
  const errorLifespan = $('errorLifespan');
  const canvas = $('gridCanvas');
  const ctx = canvas.getContext('2d');

  // ── i18n apply ──
  function applyLang() {
    const t = I18N[currentLang];
    const textEls = [
      'setupTitle','labelBirth','labelLifespan','btnSave',
      'mainTitle','mainSubtitle','statPercentLabel','statDaysLabel',
      'statRemDaysLabel','labelRemaining','labelAge',
      'legendLived','legendToday','legendFuture','footerText','btnLang',
      'panelTitle','labelSalary','labelItemPrice','costPlaceholder',
      'costHintText','toggleLabel',
    ];
    textEls.forEach((id) => {
      const el = $(id);
      if (el) el.textContent = t[id];
    });
    document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
    document.title = currentLang === 'zh'
      ? 'Living Days — 人生可视化进度'
      : 'Living Days — Life Visualized';
    localStorage.setItem(LANG_KEY, currentLang);
  }

  // ── Date math ──
  function calcDays(birthStr, lifespan) {
    const birth = new Date(birthStr + 'T00:00:00');
    const now = new Date();
    now.setHours(0, 0, 0, 0);

    const totalDays = Math.round(lifespan * 365.25);
    const diffMs = now - birth;
    const livedDays = Math.max(0, Math.floor(diffMs / 86400000));

    const ageYears = now.getFullYear() - birth.getFullYear();
    const ageMonths = now.getMonth() - birth.getMonth();
    const ageDays = now.getDate() - birth.getDate();
    let age = ageYears;
    if (ageMonths < 0 || (ageMonths === 0 && ageDays < 0)) age--;

    return { totalDays, livedDays, age };
  }

  // ── Render grid ──
  function renderGrid(totalDays, livedDays) {
    const wrap = $('canvasWrap');
    const wrapWidth = wrap.clientWidth - 32; // padding

    // Determine cell size
    const isMobile = window.innerWidth < 768;
    const cellSize = isMobile ? 2 : 3;
    const gap = 1;
    const step = cellSize + gap;

    const cols = Math.floor(wrapWidth / step);
    const rows = Math.ceil(totalDays / cols);
    const canvasW = cols * step;
    const canvasH = rows * step;

    // Set actual pixel dimensions
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvasW * dpr;
    canvas.height = canvasH * dpr;
    canvas.style.width = canvasW + 'px';
    canvas.style.height = canvasH + 'px';
    ctx.scale(dpr, dpr);

    // Clear
    ctx.clearRect(0, 0, canvasW, canvasH);

    // Draw future cells in batch
    ctx.fillStyle = '#1a1a2e';
    for (let i = 0; i < totalDays; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      ctx.fillRect(col * step, row * step, cellSize, cellSize);
    }

    // Draw lived cells in batch
    ctx.fillStyle = '#00ff88';
    const lived = Math.min(livedDays, totalDays);
    for (let i = 0; i < lived; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      ctx.fillRect(col * step, row * step, cellSize, cellSize);
    }

    // Draw today marker
    if (livedDays < totalDays && livedDays > 0) {
      const todayIdx = livedDays;
      const col = todayIdx % cols;
      const row = Math.floor(todayIdx / cols);
      ctx.fillStyle = '#00ffcc';
      ctx.fillRect(col * step, row * step, cellSize, cellSize);
      // Glow effect
      ctx.shadowColor = '#00ffcc';
      ctx.shadowBlur = 6;
      ctx.fillRect(col * step, row * step, cellSize, cellSize);
      ctx.shadowBlur = 0;
    }
  }

  // ── Update stats ──
  function updateStats(totalDays, livedDays, age) {
    const pct = totalDays > 0 ? (livedDays / totalDays) * 100 : 0;
    const displayPct = Math.min(pct, 999.99);
    const remaining = Math.max(0, totalDays - livedDays);

    $('statPercent').textContent = displayPct.toFixed(2) + '%';
    $('statLived').textContent = livedDays.toLocaleString();
    $('statTotal').textContent = totalDays.toLocaleString();
    $('statRemaining').textContent = remaining.toLocaleString();
    $('statAge').textContent = age;

    const fillPct = Math.min(pct, 100);
    $('progressFill').style.width = fillPct + '%';

    // Overshoot styling
    if (pct > 100) {
      $('statPercent').style.color = 'var(--cyan)';
      $('statPercent').style.textShadow = '0 0 20px rgba(0,255,204,.5)';
      $('progressFill').style.background = 'linear-gradient(90deg, var(--green), var(--cyan), var(--danger))';
    } else {
      $('statPercent').style.color = '';
      $('statPercent').style.textShadow = '';
      $('progressFill').style.background = '';
    }
  }

  // ── Main render ──
  function render() {
    if (!config) return;
    const { totalDays, livedDays, age } = calcDays(config.birthDate, config.lifespan);

    $('statsSection').style.display = '';
    $('canvasWrap').style.display = '';
    $('legendSection').style.display = '';

    updateStats(totalDays, livedDays, age);
    renderGrid(totalDays, livedDays);
  }

  // ── Validation ──
  function validate() {
    const t = I18N[currentLang];
    let valid = true;

    const birthVal = inputBirth.value;
    if (!birthVal) {
      errorBirth.textContent = t.errorRequired;
      valid = false;
    } else if (new Date(birthVal + 'T00:00:00') > new Date()) {
      errorBirth.textContent = t.errorFuture;
      valid = false;
    } else {
      errorBirth.textContent = '';
    }

    const lifespanVal = parseInt(inputLifespan.value, 10);
    if (isNaN(lifespanVal) || lifespanVal < 1 || lifespanVal > 150) {
      errorLifespan.textContent = t.errorLifespan;
      valid = false;
    } else {
      errorLifespan.textContent = '';
    }

    return valid;
  }

  // ── Event handlers ──
  $('btnSave').addEventListener('click', () => {
    if (!validate()) return;
    config = {
      birthDate: inputBirth.value,
      lifespan: parseInt(inputLifespan.value, 10),
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
    setupOverlay.classList.add('hidden');
    render();
  });

  $('btnReset').addEventListener('click', () => {
    if (config) {
      inputBirth.value = config.birthDate;
      inputLifespan.value = config.lifespan;
    }
    errorBirth.textContent = '';
    errorLifespan.textContent = '';
    setupOverlay.classList.remove('hidden');
  });

  $('btnLang').addEventListener('click', () => {
    currentLang = currentLang === 'zh' ? 'en' : 'zh';
    applyLang();
    if (config) render();
  });

  // Handle resize
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { if (config) render(); }, 200);
  });

  // ── Side Panel: Cost of Life ──
  const SALARY_KEY = 'life-in-days-salary';
  const sidePanel = $('sidePanel');
  const inputSalary = $('inputSalary');
  const inputItemPrice = $('inputItemPrice');
  const costResult = $('costResult');

  // Load saved salary
  try {
    const savedSalary = localStorage.getItem(SALARY_KEY);
    if (savedSalary) inputSalary.value = savedSalary;
  } catch (e) {}

  $('btnSideToggle').addEventListener('click', () => {
    sidePanel.classList.toggle('open');
  });
  $('btnPanelClose').addEventListener('click', () => {
    sidePanel.classList.remove('open');
  });

  function calcCost() {
    const salary = parseFloat(inputSalary.value);
    const price = parseFloat(inputItemPrice.value);
    const t = I18N[currentLang];

    if (!salary || salary <= 0 || !price || price < 0) {
      costResult.className = 'cost-result hidden-result';
      costResult.innerHTML = '<span id="costPlaceholder">' + t.costPlaceholder + '</span>';
      return;
    }

    // Save salary
    localStorage.setItem(SALARY_KEY, inputSalary.value);

    // 22 working days/month, 8 hours/day
    const dailyWage = salary / 22;
    const hourlyWage = dailyWage / 8;
    const totalHours = price / hourlyWage;
    const totalDays = price / dailyWage;
    const totalMonths = price / salary;

    // Build human-readable duration
    let durationText = '';
    if (totalMonths >= 12) {
      const years = Math.floor(totalMonths / 12);
      const months = Math.round(totalMonths % 12);
      durationText = years + ' ' + t.costYears;
      if (months > 0) durationText += ' ' + months + ' ' + t.costMonths;
    } else if (totalDays >= 1) {
      const days = Math.floor(totalDays);
      const hours = Math.round((totalDays - days) * 8);
      durationText = days + ' ' + t.costDays;
      if (hours > 0) durationText += ' ' + hours + ' ' + t.costHours;
    } else {
      durationText = totalHours.toFixed(1) + ' ' + t.costHours;
    }

    costResult.className = 'cost-result';
    costResult.innerHTML =
      '<div class="cost-label">' + t.costOfLife + '</div>' +
      '<div class="cost-value">' + durationText + '</div>' +
      '<div class="cost-label">' + t.costToBuy + '</div>' +
      '<div class="cost-breakdown">' +
        t.costDailyWage + ': <span>¥' + dailyWage.toFixed(0) + '</span> · ' +
        t.costHourlyWage + ': <span>¥' + hourlyWage.toFixed(1) + '</span>' +
      '</div>';
  }

  inputSalary.addEventListener('input', calcCost);
  inputItemPrice.addEventListener('input', calcCost);

  // ── Init ──
  function init() {
    // Detect language
    const savedLang = localStorage.getItem(LANG_KEY);
    if (savedLang && I18N[savedLang]) {
      currentLang = savedLang;
    } else {
      const browserLang = (navigator.language || '').toLowerCase();
      currentLang = browserLang.startsWith('zh') ? 'zh' : 'en';
    }
    applyLang();

    // Load config
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) config = JSON.parse(raw);
    } catch (e) {
      config = null;
    }

    if (config && config.birthDate) {
      setupOverlay.classList.add('hidden');
      render();
    } else {
      setupOverlay.classList.remove('hidden');
    }
  }

  init();
})();
</script>
</body>
</html>
